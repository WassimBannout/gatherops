services:
  postgres:
    image: postgres:16-alpine
    container_name: gatherops-postgres
    environment:
      POSTGRES_DB: gatherops
      POSTGRES_USER: gatherops
      POSTGRES_PASSWORD: gatherops
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatherops -d gatherops"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
