openapi: 3.1.0
info:
  title: GatherOps API
  version: 0.1.0
  summary: Production-minded event operations API.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Check process health.
      operationId: getHealth
      responses:
        '200':
          description: The API process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      summary: Check dependency readiness.
      operationId: getReadiness
      responses:
        '200':
          description: The API can reach required dependencies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: A required dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
    ReadinessResponse:
      type: object
      required:
        - status
        - dependencies
      properties:
        status:
          type: string
          enum:
            - ready
        dependencies:
          type: object
          required:
            - database
          properties:
            database:
              type: string
              enum:
                - ok
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            requestId:
              type: string
